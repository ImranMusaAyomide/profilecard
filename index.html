<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<article class="profile-card" data-testid="test-profile-card" aria-label="User profile card">
  <figure class="profile-media">
    <img
      id="profile-avatar"
      src="https://images.unsplash.com/photo-1544725176-7c40e5a71c5e?auto=format&fit=crop&w=400&q=80"
      alt="Portrait photo of John Doe smiling outdoors"
      data-testid="test-user-avatar"
    />
    <figcaption>John Doe</figcaption>
  </figure>

  <div class="profile-content">
    <header class="profile-header">
      <h2 data-testid="test-user-name">John Doe</h2>
      <div class="time-block" aria-live="polite" aria-atomic="true">
        <p class="time-readable" id="user-time-readable">
          <i class="fa-regular fa-clock" aria-hidden="true"></i>
          <span>--:--:--</span>
        </p>
        <p
          class="time"
          id="user-time"
          data-testid="test-user-time"
          aria-label="Current epoch time in milliseconds"
        ></p>
      </div>
    </header>

    <p data-testid="test-user-bio">
      Front-end developer focused on accessible web experiences, clean design systems, and
      practical UI engineering.
    </p>

    <nav aria-label="Social links" data-testid="test-user-social-links">
      <ul class="social-list">
        <li>
          <a
            href="https://x.com/"
            target="_blank"
            rel="noopener noreferrer"
            data-testid="test-user-social-twitter"
            aria-label="Open Twitter profile in a new tab"
          >
            <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            <span>Twitter</span>
          </a>
        </li>
        <li>
          <a
            href="https://github.com/"
            target="_blank"
            rel="noopener noreferrer"
            data-testid="test-user-social-github"
            aria-label="Open GitHub profile in a new tab"
          >
            <i class="fa-brands fa-github" aria-hidden="true"></i>
            <span>GitHub</span>
          </a>
        </li>
        <li>
          <a
            href="https://linkedin.com/"
            target="_blank"
            rel="noopener noreferrer"
            data-testid="test-user-social-linkedin"
            aria-label="Open LinkedIn profile in a new tab"
          >
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
            <span>LinkedIn</span>
          </a>
        </li>
      </ul>
    </nav>

    <section aria-label="Hobbies">
      <h3><i class="fa-solid fa-heart" aria-hidden="true"></i> Hobbies</h3>
      <ul data-testid="test-user-hobbies">
        <li><i class="fa-solid fa-camera" aria-hidden="true"></i> Photography</li>
        <li><i class="fa-solid fa-book-open" aria-hidden="true"></i> Reading</li>
        <li><i class="fa-solid fa-mountain-sun" aria-hidden="true"></i> Hiking</li>
      </ul>
    </section>

    <section aria-label="Dislikes">
      <h3><i class="fa-solid fa-ban" aria-hidden="true"></i> Dislikes</h3>
      <ul data-testid="test-user-dislikes">
        <li><i class="fa-solid fa-envelope-circle-check" aria-hidden="true"></i> Spam emails</li>
        <li><i class="fa-solid fa-wifi" aria-hidden="true"></i> Slow internet</li>
        <li><i class="fa-solid fa-volume-xmark" aria-hidden="true"></i> Overly loud spaces</li>
      </ul>
    </section>
  </div>
</article>

<script src="script.js"></script>
</body>
</html>
